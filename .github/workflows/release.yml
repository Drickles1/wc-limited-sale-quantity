name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify tag matches plugin header version and readme.txt stable tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          HEADER_VERSION=$(grep -m1 "^ \* Version:" vivid-sale-quantity-limiter.php | sed 's/.*Version:[[:space:]]*//')
          if [ "$VERSION" != "$HEADER_VERSION" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match plugin header version ${HEADER_VERSION}"
            exit 1
          fi
          STABLE_TAG=$(grep -m1 "^Stable tag:" readme.txt | sed 's/.*Stable tag:[[:space:]]*//')
          if [ "$VERSION" != "$STABLE_TAG" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match readme.txt Stable tag ${STABLE_TAG}"
            exit 1
          fi

      - name: Build plugin zip
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p build/vivid-sale-quantity-limiter
          cp vivid-sale-quantity-limiter.php readme.txt build/vivid-sale-quantity-limiter/
          cd build
          zip -r "vivid-sale-quantity-limiter-${VERSION}.zip" vivid-sale-quantity-limiter

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release create "${GITHUB_REF_NAME}" \
            "build/vivid-sale-quantity-limiter-${VERSION}.zip" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
