name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify tag matches plugin header version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          HEADER_VERSION=$(grep -m1 "^ \* Version:" limited-sale-quantity-for-woocommerce.php | sed 's/.*Version:[[:space:]]*//')
          if [ "$VERSION" != "$HEADER_VERSION" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match plugin header version ${HEADER_VERSION}"
            exit 1
          fi

      - name: Build plugin zip
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p build/limited-sale-quantity-for-woocommerce
          cp limited-sale-quantity-for-woocommerce.php build/limited-sale-quantity-for-woocommerce/
          cd build
          zip -r "limited-sale-quantity-for-woocommerce-${VERSION}.zip" limited-sale-quantity-for-woocommerce

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release create "${GITHUB_REF_NAME}" \
            "build/limited-sale-quantity-for-woocommerce-${VERSION}.zip" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
